<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホタルイカ予測｜富山湾 風・天気</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap');
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --glow: #3fb950;
      --port: #f0883e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .app {
      display: grid;
      grid-template-columns: 380px 1fr;
      grid-template-rows: auto auto 1fr;
      height: 100vh;
      min-height: 100vh;
    }
    @media (max-width: 768px) {
      body { overflow: hidden; }
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto minmax(0, 32vh) 1fr;
        height: 100vh;
        height: 100dvh;
      }
      .timeline-bar { padding: 10px 12px 12px; }
      .timeline-bar .timeline-slider-wrap { min-width: 120px; }
      .timeline-bar input[type="range"]::-webkit-slider-thumb { width: 24px; height: 24px; }
      .timeline-bar input[type="range"]::-moz-range-thumb { width: 24px; height: 24px; }
      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
        overflow-y: auto;
        min-height: 0;
      }
      .map-wrap {
        min-height: 0;
        min-height: 50vh;
      }
      #map { min-height: 280px; }
      .wind-legend {
        left: 8px;
        bottom: 12px;
        padding: 8px 10px;
        font-size: 0.75rem;
        max-width: calc(100vw - 24px);
      }
    }
    header {
      grid-column: 1 / -1;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6ee7b7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header .sub {
      color: var(--muted);
      font-size: 0.875rem;
    }
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px;
      overflow-y: auto;
    }
    .sidebar h2 {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .port-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .port-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.9375rem;
      transition: border-color .2s, background .2s;
    }
    .port-btn:hover, .port-btn.active {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.08);
    }
    .port-btn .temp {
      color: var(--glow);
      font-weight: 600;
    }
    .weather-panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .weather-panel .location {
      font-weight: 600;
      margin-bottom: 12px;
      font-size: 1rem;
    }
    .weather-now {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: center;
      margin-bottom: 12px;
    }
    .weather-now .temp-large {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text);
    }
    .weather-now .temp-large span { font-size: 1.25rem; color: var(--muted); }
    .weather-desc {
      font-size: 0.9375rem;
      color: var(--muted);
    }
    .wind-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .wind-arrow {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
    }
    .wind-arrow svg {
      width: 24px;
      height: 24px;
      fill: var(--accent);
    }
    .wind-text {
      font-size: 0.9375rem;
      color: var(--muted);
    }
    .wind-text strong { color: var(--text); }
    .timeline-bar {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 18px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }
    .timeline-bar .timeline-label {
      font-size: 0.9375rem;
      color: var(--muted);
      min-width: 140px;
    }
    .timeline-bar .timeline-label strong {
      color: var(--text);
      font-size: 1rem;
    }
    .timeline-bar .timeline-slider-wrap {
      flex: 1;
      min-width: 200px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .timeline-bar input[type="range"] {
      flex: 1;
      height: 28px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, var(--border), var(--accent));
      border-radius: 14px;
      outline: none;
    }
    .timeline-bar input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(88, 166, 255, 0.6);
      border: 2px solid var(--text);
    }
    .timeline-bar input[type="range"]::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(88, 166, 255, 0.6);
      border: 2px solid var(--text);
    }
    .map-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
    }
    #map {
      width: 100%;
      height: 100%;
      min-height: 200px;
      background: #0a0e12;
    }
    .wind-legend {
      position: absolute;
      bottom: 24px;
      left: 24px;
      background: rgba(22, 27, 34, 0.95);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.8125rem;
      color: var(--muted);
      z-index: 1000;
    }
    .wind-legend strong { color: var(--text); }
    .wind-legend .legend-port { color: var(--glow); font-size: 0.75rem; }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--muted);
    }
    .loading::after {
      content: '';
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      color: #f85149;
      font-size: 0.875rem;
      padding: 8px 0;
    }
    .leaflet-marker-icon.port-marker,
    .port-marker-icon { background: none !important; border: none !important; }
    .port-marker-icon .port-weather-icon {
      font-size: 22px;
      line-height: 1;
      display: inline-block;
      filter: drop-shadow(0 0 2px rgba(0,0,0,0.8));
    }
    .wind-marker {
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: center;
    }
    .wind-marker svg {
      width: 26px;
      height: 26px;
      fill: rgba(88, 166, 255, 0.9);
      filter: drop-shadow(0 0 3px rgba(88, 166, 255, 0.6));
    }
    /* Windy風・流れアニメーション */
    .wind-flow {
      width: 32px;
      height: 32px;
      position: relative;
      overflow: hidden;
      transform-origin: center;
    }
    .wind-flow .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(88, 166, 255, 0.9);
      box-shadow: 0 0 6px rgba(88, 166, 255, 0.8);
      left: 50%;
      top: 50%;
      margin-left: -1.5px;
      margin-top: -1.5px;
      animation: wind-drift var(--wind-duration, 1.5s) linear infinite;
    }
    .wind-flow .particle:nth-child(1) { animation-delay: 0s; }
    .wind-flow .particle:nth-child(2) { animation-delay: 0.15s; }
    .wind-flow .particle:nth-child(3) { animation-delay: 0.3s; }
    .wind-flow .particle:nth-child(4) { animation-delay: 0.45s; }
    .wind-flow .particle:nth-child(5) { animation-delay: 0.6s; }
    .wind-flow .particle:nth-child(6) { animation-delay: 0.75s; }
    .wind-flow .particle:nth-child(7) { animation-delay: 0.9s; }
    .selected-port-wind .wind-flow .particle {
      background: rgba(63, 185, 80, 0.95);
      box-shadow: 0 0 8px rgba(63, 185, 80, 0.9);
    }
    .selected-port-wind .wind-flow { width: 40px; height: 40px; }
    .selected-port-wind .wind-flow .particle { width: 4px; height: 4px; margin-left: -2px; margin-top: -2px; }
    @keyframes wind-drift {
      0% { transform: translateX(-18px); opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translateX(18px); opacity: 0; }
    }
    /* 一週間予報 */
    .week-forecast { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 12px; }
    .week-forecast h3 { font-size: 0.8125rem; color: var(--muted); margin-bottom: 10px; }
    .week-row {
      display: grid;
      grid-template-columns: 4em 1fr 2.5em 2.5em;
      gap: 8px;
      align-items: center;
      padding: 6px 0;
      font-size: 0.875rem;
      border-bottom: 1px solid var(--border);
    }
    .week-row:last-child { border-bottom: none; }
    .week-row .day-label { color: var(--muted); }
    .week-row .day-weather { color: var(--text); }
    .week-row .day-max { color: #f0883e; font-weight: 600; }
    .week-row .day-min { color: var(--accent); }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🐙 ホタルイカ予測</h1>
      <span class="sub">富山湾｜風向き・気温・天気</span>
    </header>
    <div class="timeline-bar" id="timelineBar" style="display:none;">
      <span class="timeline-label" id="timelineLabel">表示中: <strong>—</strong></span>
      <div class="timeline-slider-wrap">
        <input type="range" id="timelineSlider" min="0" max="167" value="0" step="1" title="時刻を選択" />
      </div>
    </div>
    <aside class="sidebar">
      <h2>港を選択</h2>
      <div class="port-list" id="portList">
        <div class="loading" id="portLoading">天気を取得中…</div>
      </div>
      <h2>現在の天気（選択中）</h2>
      <p class="update-time" id="updateTime" style="font-size:0.75rem;color:var(--muted);margin-bottom:8px;"></p>
      <div class="weather-panel" id="weatherPanel">
        <div class="location" id="panelLocation">—</div>
        <div class="weather-now">
          <div>
            <div class="temp-large" id="panelTemp">—<span>°C</span></div>
            <div class="weather-desc" id="panelDesc">—</div>
          </div>
        </div>
        <div class="wind-row">
          <div class="wind-arrow" id="panelWindArrow">
            <svg viewBox="0 0 24 24"><path d="M12 2L10 8h4L12 2zm0 6l-2 12h4L12 8z"/></svg>
          </div>
          <div class="wind-text" id="panelWind">風 — 風速 — km/h</div>
        </div>
        <div class="week-forecast" id="weekForecast" style="display:none;">
          <h3>一週間の予報</h3>
          <div id="weekForecastRows"></div>
        </div>
      </div>
    </aside>
    <div class="map-wrap">
      <div id="map"></div>
      <div class="wind-legend">
        <strong>風</strong>：流れ＝風の吹く方向。<br>
        <span class="legend-port">緑＝選択港（左パネルと同一データ）</span>　青＝湾上グリッド
      </div>
    </div>
  </div>

  <script>
    (function () {
      const TOYAMA_CENTER = [36.77, 137.35];
      const TOYAMA_ZOOM = 9;

      const PORTS = [
        { id: 'amaharashi', name: '雨晴海岸', lat: 36.8186, lon: 137.0346 },
        { id: 'shinminato', name: '新湊港', lat: 36.7872, lon: 137.0816 },
        { id: 'ebie', name: '海老江海浜公園', lat: 36.7683, lon: 137.1421 },
        { id: 'yokata', name: '四方港', lat: 36.7603, lon: 137.1931 },
        { id: 'yaetsu', name: '八重津浜', lat: 36.7593, lon: 137.2041 },
        { id: 'iwase', name: '岩瀬浜', lat: 36.7646, lon: 137.2380 },
        { id: 'hamagurozaki', name: '浜黒崎海岸', lat: 36.7585, lon: 137.2865 },
        { id: 'namerikawa', name: '滑川漁港', lat: 36.7723, lon: 137.3483 },
        { id: 'namerikawa-park', name: '滑川海浜公園', lat: 36.7700, lon: 137.3500 },
        { id: 'yoshiura', name: '吉浦浜', lat: 36.7900, lon: 137.3700 },
        { id: 'uozu', name: '魚津漁港', lat: 36.8213, lon: 137.3938 },
      ];

      const WIND_GRID = [];
      for (let lat = 36.68; lat <= 36.90; lat += 0.055) {
        for (let lon = 137.05; lon <= 137.48; lon += 0.07) {
          WIND_GRID.push({ lat: Math.round(lat * 100) / 100, lon: Math.round(lon * 100) / 100 });
        }
      }

      const WMO_CODES = {
        0: '快晴', 1: 'おおむね晴れ', 2: '晴れ時々曇り', 3: '曇り',
        45: '霧', 48: '霧', 51: '霧雨', 53: '霧雨', 55: '霧雨',
        61: '雨', 63: '雨', 65: '強い雨', 71: '雪', 73: '雪', 75: '大雪',
        77: '雪', 80: 'にわか雨', 81: 'にわか雨', 82: 'にわか雨',
        85: 'にわか雪', 86: 'にわか雪', 95: '雷', 96: '雷', 99: '雷',
      };

      const WMO_ICONS = {
        0: '☀️', 1: '🌤', 2: '⛅', 3: '☁️',
        45: '🌫', 48: '🌫', 51: '🌧', 53: '🌧', 55: '🌧',
        61: '🌧', 63: '🌧', 65: '🌧', 71: '❄️', 73: '❄️', 75: '❄️', 77: '❄️',
        80: '🌦', 81: '🌦', 82: '🌦', 85: '🌨', 86: '🌨',
        95: '⛈', 96: '⛈', 99: '⛈',
      };

      function getWeatherIcon(code) {
        if (code === undefined || code === null) return '🌡';
        return WMO_ICONS[code] || '🌡';
      }

      function wmoToDesc(code) {
        if (code === undefined || code === null) return '—';
        return WMO_CODES[code] || '天気コード ' + code;
      }

      function windDegToDir(deg) {
        if (deg == null) return '—';
        const d = ['北', '北東', '東', '南東', '南', '南西', '西', '北西'];
        const i = Math.round(deg / 45) % 8;
        return d[i];
      }

      const map = L.map('map', { center: TOYAMA_CENTER, zoom: TOYAMA_ZOOM });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap, &copy; CARTO'
      }).addTo(map);

      window.addEventListener('resize', function () { map.invalidateSize(); });
      setTimeout(function () { map.invalidateSize(); }, 100);

      const portLayer = L.layerGroup().addTo(map);
      const windLayer = L.layerGroup().addTo(map);
      const selectedPortWindLayer = L.layerGroup().addTo(map);

      let portWeather = {};
      let selectedPortId = null;
      let windGridHourlyData = [];
      let hourlyTimeLabels = [];
      let currentHourIndex = 0;

      function createWindIconHtml(degree, speedKmh) {
        const rot = (degree || 0) + 180;
        const duration = Math.max(0.8, Math.min(2.5, 2.5 - (speedKmh || 0) * 0.06));
        const particles = Array(7).fill(0).map(() => '<span class="particle"></span>').join('');
        return `<div class="wind-flow" style="transform:rotate(${rot}deg);--wind-duration:${duration}s">${particles}</div>`;
      }

      function fetchWeather() {
        const lats = PORTS.map(p => p.lat).join(',');
        const lons = PORTS.map(p => p.lon).join(',');
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&current_weather=true&hourly=temperature_2m,weather_code,wind_direction_10m,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,weather_code&forecast_days=7&timezone=Asia%2FTokyo`;
        return fetch(url).then(r => r.json());
      }

      function fetchWindGrid() {
        const lats = WIND_GRID.map(p => p.lat).join(',');
        const lons = WIND_GRID.map(p => p.lon).join(',');
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&hourly=wind_direction_10m,wind_speed_10m&forecast_days=7&timezone=Asia%2FTokyo`;
        return fetch(url).then(r => r.json());
      }

      function applyPortWeather(data) {
        const list = Array.isArray(data) ? data : [data];
        list.forEach((loc, i) => {
          const port = PORTS[i];
          if (!port) return;
          const cur = loc.current_weather || {};
          const hourly = loc.hourly ? {
            time: loc.hourly.time || [],
            temperature_2m: loc.hourly.temperature_2m || [],
            weather_code: loc.hourly.weather_code || [],
            wind_direction_10m: loc.hourly.wind_direction_10m || [],
            wind_speed_10m: loc.hourly.wind_speed_10m || [],
          } : null;
          portWeather[port.id] = {
            ...port,
            ...cur,
            weatherDesc: wmoToDesc(cur.weathercode),
            windDir: windDegToDir(cur.winddirection),
            hourly: hourly,
            daily: loc.daily ? {
              time: loc.daily.time || [],
              max: loc.daily.temperature_2m_max || [],
              min: loc.daily.temperature_2m_min || [],
              weather_code: loc.daily.weather_code || [],
            } : null,
          };
        });
      }

      function formatHourLabel(isoDateTime) {
        if (!isoDateTime) return '—';
        var s = String(isoDateTime);
        var part = s.split('T');
        if (part.length < 2) return s;
        var datePart = part[0].split('-');
        var timePart = part[1].slice(0, 5).split(':');
        var m = parseInt(datePart[1], 10);
        var day = parseInt(datePart[2], 10);
        var h = timePart[0] ? parseInt(timePart[0], 10) : 0;
        var min = timePart[1] ? parseInt(timePart[1], 10) : 0;
        var pad = function (n) { return (n < 10 ? '0' : '') + n; };
        return m + '/' + day + ' ' + pad(h) + ':' + pad(min);
      }

      function applyWindGridForHour(hourIndex) {
        windLayer.clearLayers();
        selectedPortWindLayer.clearLayers();
        if (hourIndex < 0) return;
        if (windGridHourlyData.length) {
          windGridHourlyData.forEach((loc, i) => {
            const point = WIND_GRID[i];
            if (!point || !loc.hourly) return;
            const dir = loc.hourly.wind_direction_10m;
            const speed = loc.hourly.wind_speed_10m;
            const deg = (dir && dir[hourIndex] != null) ? dir[hourIndex] : 0;
            const sp = (speed && speed[hourIndex] != null) ? speed[hourIndex] : 0;
            const icon = L.divIcon({
              className: 'wind-marker-icon',
              html: createWindIconHtml(deg, sp),
              iconSize: [32, 32],
              iconAnchor: [16, 16],
            });
            L.marker([point.lat, point.lon], { icon }).addTo(windLayer);
          });
        }
        var w = selectedPortId ? portWeather[selectedPortId] : null;
        if (w && w.hourly && w.hourly.wind_direction_10m && w.hourly.wind_direction_10m[hourIndex] != null) {
          var deg = w.hourly.wind_direction_10m[hourIndex];
          var sp = (w.hourly.wind_speed_10m && w.hourly.wind_speed_10m[hourIndex] != null) ? w.hourly.wind_speed_10m[hourIndex] : 0;
          var icon = L.divIcon({
            className: 'wind-marker-icon selected-port-wind',
            html: createWindIconHtml(deg, sp),
            iconSize: [40, 40],
            iconAnchor: [20, 20],
          });
          L.marker([w.lat, w.lon], { icon: icon }).addTo(selectedPortWindLayer);
        }
      }

      function renderPortList() {
        var wrap = document.getElementById('portList');
        var idx = currentHourIndex;
        wrap.innerHTML = PORTS.map(function (p) {
          var w = portWeather[p.id];
          var temp = '—';
          if (w) {
            if (w.hourly && w.hourly.temperature_2m && w.hourly.temperature_2m[idx] != null)
              temp = Math.round(w.hourly.temperature_2m[idx]) + '°C';
            else if (w.temperature != null)
              temp = Math.round(w.temperature) + '°C';
          }
          var active = selectedPortId === p.id ? ' active' : '';
          return '<button type="button" class="port-btn' + active + '" data-port="' + p.id + '">' + p.name + '<span class="temp">' + temp + '</span></button>';
        }).join('');
        wrap.querySelectorAll('.port-btn').forEach(function (btn) {
          btn.addEventListener('click', function () { selectPort(btn.dataset.port); });
        });
      }

      const DAY_NAMES = ['日', '月', '火', '水', '木', '金', '土'];
      function formatDayLabel(isoDate) {
        if (!isoDate) return '—';
        const d = new Date(isoDate + 'T12:00:00+09:00');
        const m = d.getMonth() + 1;
        const day = d.getDate();
        const week = DAY_NAMES[d.getDay()];
        return `${m}/${day} ${week}`;
      }

      function updatePanelForHour() {
        const w = selectedPortId ? portWeather[selectedPortId] : null;
        const port = selectedPortId ? PORTS.find(p => p.id === selectedPortId) : null;
        const locName = port ? port.name : '—';
        document.getElementById('panelLocation').textContent = locName;
        const weekEl = document.getElementById('weekForecast');
        const rowsEl = document.getElementById('weekForecastRows');
        if (!w) {
          document.getElementById('panelTemp').innerHTML = '—<span>°C</span>';
          document.getElementById('panelDesc').textContent = '—';
          document.getElementById('panelWind').innerHTML = '風 — 風速 — km/h';
          document.getElementById('panelWindArrow').style.transform = 'rotate(0deg)';
          weekEl.style.display = 'none';
          return;
        }
        const hasHourly = w.hourly && w.hourly.time && w.hourly.time.length;
        const idx = currentHourIndex;
        if (hasHourly && idx >= 0 && idx < w.hourly.time.length) {
          const t = w.hourly.temperature_2m[idx];
          const code = w.hourly.weather_code[idx];
          const deg = w.hourly.wind_direction_10m[idx];
          const speed = w.hourly.wind_speed_10m[idx];
          document.getElementById('panelTemp').innerHTML = (t != null ? Math.round(t) : '—') + '<span>°C</span>';
          document.getElementById('panelDesc').textContent = wmoToDesc(code);
          document.getElementById('panelWind').innerHTML = '風 ' + windDegToDir(deg) + ' 風速 ' + (speed != null ? speed : '—') + ' km/h';
          document.getElementById('panelWindArrow').style.transform = `rotate(${(deg || 0) + 180}deg)`;
        } else {
          document.getElementById('panelTemp').innerHTML = (w.temperature != null ? Math.round(w.temperature) : '—') + '<span>°C</span>';
          document.getElementById('panelDesc').textContent = w.weatherDesc;
          document.getElementById('panelWind').innerHTML = '風 ' + (w.windDir || '—') + ' 風速 ' + (w.windspeed != null ? w.windspeed : '—') + ' km/h';
          document.getElementById('panelWindArrow').style.transform = `rotate(${(w.winddirection || 0) + 180}deg)`;
        }
        if (w.daily && w.daily.time && w.daily.time.length) {
          weekEl.style.display = 'block';
          rowsEl.innerHTML = w.daily.time.map((date, i) => {
            const max = w.daily.max[i] != null ? Math.round(w.daily.max[i]) : '—';
            const min = w.daily.min[i] != null ? Math.round(w.daily.min[i]) : '—';
            const code = w.daily.weather_code[i];
            const desc = wmoToDesc(code);
            return `<div class="week-row"><span class="day-label">${formatDayLabel(date)}</span><span class="day-weather">${desc}</span><span class="day-max">${max}°</span><span class="day-min">${min}°</span></div>`;
          }).join('');
        } else {
          weekEl.style.display = 'none';
        }
      }

      function selectPort(id) {
        selectedPortId = id;
        renderPortList();
        updatePanelForHour();
      }

      function updatePortMarkers() {
        portLayer.clearLayers();
        var idx = currentHourIndex;
        PORTS.forEach(function (p) {
          var w = portWeather[p.id];
          var code = (w && w.hourly && w.hourly.weather_code && w.hourly.weather_code[idx] != null)
            ? w.hourly.weather_code[idx]
            : (w && w.weathercode != null ? w.weathercode : null);
          var iconChar = getWeatherIcon(code);
          var portIcon = L.divIcon({
            className: 'port-marker-icon',
            html: '<span class="port-weather-icon" title="' + (p.name || '') + '">' + iconChar + '</span>',
            iconSize: [28, 28],
            iconAnchor: [14, 14],
          });
          var marker = L.marker([p.lat, p.lon], {
            icon: portIcon,
            title: p.name,
          }).addTo(portLayer);
          marker.on('click', function () {
            selectPort(p.id);
            renderPortList();
          });
        });
      }

      function setTimelineToNow(timeStrings) {
        if (!timeStrings || !timeStrings.length) return;
        var now = new Date();
        var best = 0;
        var bestDiff = 1e9;
        timeStrings.forEach(function (iso, i) {
          var d = new Date(iso + '+09:00');
          if (isNaN(d.getTime())) return;
          var diff = Math.abs(d - now);
          if (diff < bestDiff) { bestDiff = diff; best = i; }
        });
        currentHourIndex = best;
      }

      function onTimelineInput() {
        var slider = document.getElementById('timelineSlider');
        currentHourIndex = parseInt(slider.value, 10);
        document.getElementById('timelineLabel').innerHTML = '表示中: <strong>' + (hourlyTimeLabels[currentHourIndex] || '—') + '</strong>';
        applyWindGridForHour(currentHourIndex);
        updatePanelForHour();
        renderPortList();
        updatePortMarkers();
      }

      Promise.all([fetchWeather(), fetchWindGrid()])
        .then(([portData, windData]) => {
          applyPortWeather(portData);
          windGridHourlyData = Array.isArray(windData) ? windData : [windData];
          var firstPort = Array.isArray(portData) ? portData[0] : portData;
          var firstHourly = firstPort && firstPort.hourly && firstPort.hourly.time;
          hourlyTimeLabels = firstHourly ? firstPort.hourly.time.map(function (t) { return formatHourLabel(t); }) : [];
          setTimelineToNow(firstHourly);
          document.getElementById('timelineBar').style.display = 'flex';
          const slider = document.getElementById('timelineSlider');
          const maxHour = Math.max(0, hourlyTimeLabels.length - 1);
          slider.setAttribute('max', String(maxHour));
          slider.value = String(currentHourIndex);
          slider.addEventListener('input', onTimelineInput);
          document.getElementById('timelineLabel').innerHTML = '表示中: <strong>' + (hourlyTimeLabels[currentHourIndex] || '—') + '</strong>';
          applyWindGridForHour(currentHourIndex);
          renderPortList();
          updatePortMarkers();
          selectedPortId = 'namerikawa';
          selectPort('namerikawa');
          renderPortList();
          updatePanelForHour();
          const t = (portData[0] || portData).current_weather?.time;
          document.getElementById('updateTime').textContent = t ? '更新: ' + t.replace('T', ' ').slice(0, 16) + ' (JST)' : '';
        })
        .catch(err => {
          document.getElementById('portList').innerHTML = '<div class="error-msg">天気の取得に失敗しました: ' + err.message + '</div>';
        });
    })();
  </script>
</body>
</html>
